# fly.toml — Fly.io deployment for the Outbreak API.
# Secrets (set via `fly secrets set KEY=value`): DATABASE_URL, JWT_SECRET,
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, SENTRY_DSN (optional).

app = "outbreak-api"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  API_PORT = "4000"
  API_ORIGIN = "https://api.outbreak.example"
  WEB_ORIGIN = "https://outbreak.example"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
