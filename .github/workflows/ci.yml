name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @outbreak/api db:generate
      - run: pnpm typecheck
      - run: pnpm lint

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: outbreak
          POSTGRES_PASSWORD: outbreak
          POSTGRES_DB: outbreak_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U outbreak -d outbreak_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://outbreak:outbreak@localhost:5433/outbreak_test?schema=public
      JWT_SECRET: test-test-test-test-test-test-test-test-test-test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @outbreak/api db:generate
      - run: pnpm --filter @outbreak/api exec prisma migrate deploy
      - run: pnpm --filter @outbreak/api test

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @outbreak/api db:generate
      - run: pnpm --filter @outbreak/web test
