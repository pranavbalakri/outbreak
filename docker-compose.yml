services:
  postgres:
    image: postgres:16-alpine
    container_name: breaklog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: breaklog
      POSTGRES_PASSWORD: breaklog
      POSTGRES_DB: breaklog
    ports:
      - "5433:5432"
    volumes:
      - breaklog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breaklog -d breaklog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  breaklog_postgres_data:
